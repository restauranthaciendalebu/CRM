runConfig:
  runtime: nodejs20
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 3

env:
  - variable: NODE_ENV
    value: production
  - variable: FIRESTORE_ADMIN_ENABLED
    value: "true"
  - variable: FIRESTORE_STATE_DOC_PATH
    value: settings/restaurant_state

scripts:
  buildCommand: npm install && npm run build
  runCommand: npm run start
